name: Sonus
options:
  bundleIdPrefix: com.sonus
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  Sonus:
    type: application
    platform: iOS
    sources:
      - path: Sonus
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Sonus/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.sonus.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: "YES"
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sonus/App/Info.plist
